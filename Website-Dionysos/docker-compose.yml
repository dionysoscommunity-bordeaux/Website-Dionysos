services:
  website-dionysos:
    build:
      context: .
      dockerfile: Dockerfile
    image: website-dionysos:latest
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NUXT_PUBLIC_PLAUSIBLE_DOMAIN:-localhost}
      NUXT_PUBLIC_PLAUSIBLE_API_HOST: ${NUXT_PUBLIC_PLAUSIBLE_API_HOST:-https://plausible.io}
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
