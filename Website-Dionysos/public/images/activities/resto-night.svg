<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Soiree resto en groupe</title>
  <desc id="desc">Illustration neon d'un diner convivial entre membres a Bordeaux.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070016"/>
      <stop offset="100%" stop-color="#1b0840"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="230" cy="170" r="120" fill="#23d9ff" fill-opacity="0.14"/>
  <circle cx="980" cy="620" r="180" fill="#ff2bb5" fill-opacity="0.12"/>
  <rect x="190" y="420" width="820" height="170" rx="26" fill="#0f0931" stroke="#23d9ff" stroke-opacity="0.55" stroke-width="3"/>
  <circle cx="360" cy="505" r="56" fill="#ff2bb5" fill-opacity="0.2" stroke="#ff2bb5" stroke-width="3"/>
  <circle cx="600" cy="505" r="56" fill="#23d9ff" fill-opacity="0.2" stroke="#23d9ff" stroke-width="3"/>
