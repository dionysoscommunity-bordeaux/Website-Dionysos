  <text x="200" y="360" fill="#7be9ff" font-family="Arial, sans-serif" font-size="56" font-weight="700">Soiree resto en groupe</text>
  <text x="200" y="650" fill="#e6e8f5" font-family="Arial, sans-serif" font-size="34">Ambiance conviviale - Centre de Bordeaux</text>
